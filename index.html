<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Gerência - Sentinela Ops</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
</head>
<body>

    <header>
        <h1>Gerência de Controle - Sentinela</h1>
        <p>Monitoramento de Postos em Tempo Real</p>
    </header>

    <main>
        <div id="status">Conectando ao banco de dados...</div>
        <table border="1" id="tabela-visitas">
            <thead>
                <tr>
                    <th>Colaborador</th>
                    <th>Posto</th>
                    <th>Data/Hora</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="corpo-tabela">
                </tbody>
        </table>
    </main>

    <script>
        // Suas credenciais fornecidas
        const firebaseConfig = {
            apiKey: "AIzaSyBL4Nka91iGIAWSTfvAmsqDHCj2KMhWZ70",
            authDomain: "sentinela-ops-profissional.firebaseapp.com",
            projectId: "sentinela-ops-profissional",
            storageBucket: "sentinela-ops-profissional.firebasestorage.app",
            messagingSenderId: "458111218365",
            appId: "1:458111218365:web:0f3b41ab7c2ceb7feebdd4"
        };

        // Inicializar o Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // Referência para onde os dados de campo são salvos (ex: 'rondas' ou 'visitas')
        // Ajuste o nome 'rondas' para o nome exato da pasta no seu Firebase
        const caminhoDados = database.ref('rondas');

        // Função para escutar os dados em tempo real
        caminhoDados.on('value', (snapshot) => {
            const corpoTabela = document.getElementById('corpo-tabela');
            const statusDiv = document.getElementById('status');
            corpoTabela.innerHTML = ""; // Limpa a tabela antes de atualizar

            if (snapshot.exists()) {
                statusDiv.innerText = "Dados atualizados.";
                snapshot.forEach((childSnapshot) => {
                    const dados = childSnapshot.val();
                    
                    // Cria uma nova linha na tabela
                    const linha = `
                        <tr>
                            <td>${dados.colaborador || 'N/A'}</td>
                            <td>${dados.posto || 'N/A'}</td>
                            <td>${dados.dataHora || 'N/A'}</td>
                            <td>${dados.status || 'OK'}</td>
                        </tr>
                    `;
                    corpoTabela.innerHTML += linha;
                });
            } else {
                statusDiv.innerText = "Nenhum registro encontrado.";
            }
        }, (error) => {
            console.error("Erro na leitura:", error);
            statusDiv.innerText = "Erro de permissão no Firebase.";
        });
    </script>
</body>
</html>
