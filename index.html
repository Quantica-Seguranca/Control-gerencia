```html
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerência - Sentinela Ops</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #34495e;
            --success: #27ae60;
            --danger: #e74c3c;
            --accent: #2563eb;
            --bg: #f4f7f6;
        }

        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); margin: 0; display: flex; min-height: 100vh; }
        
        /* Sidebar */
        nav { width: 260px; background: var(--primary); color: white; padding: 20px; display: flex; flex-direction: column; box-shadow: 2px 0 10px rgba(0,0,0,0.1); z-index: 100; }
        nav h2 { font-size: 18px; text-align: center; border-bottom: 1px solid #4f5d73; padding-bottom: 15px; margin-bottom: 20px; }
        .nav-btn { background: none; border: none; color: #bdc3c7; padding: 12px; text-align: left; cursor: pointer; width: 100%; border-radius: 6px; margin-bottom: 5px; transition: 0.3s; }
        .nav-btn:hover, .nav-btn.active { background: var(--secondary); color: white; }
        .btn-logout { background: var(--danger); color: white; margin-top: auto; text-align: center; }

        /* Main Content */
        .main { flex: 1; padding: 30px; overflow-y: auto; }
        #secao-login { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: flex; align-items: center; justify-content: center; }
        .login-box { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 350px; text-align: center; }
        
        input, select { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button.primary { width: 100%; padding: 12px; background: var(--success); color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }

        .view-secao { display: none; }
        .view-secao.active { display: block; }

        /* Cards & Tables */
        .card-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); border-left: 4px solid var(--accent); }
        .card h3 { margin: 0; font-size: 12px; color: #7f8c8d; text-transform: uppercase; }
        .card .valor { font-size: 24px; font-weight: bold; margin-top: 5px; }

        table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #eee; font-size: 14px; }
        th { background: var(--secondary); color: white; }

        /* Heatmap */
        .heatmap-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; max-width: 350px; margin-top: 15px; }
        .heatmap-dia { aspect-ratio: 1; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: bold; border: 1px solid #e2e8f0; }
        .intensidade-0 { background: #f8fafc; color: #94a3b8; }
        .intensidade-1 { background: #bbf7d0; }
        .intensidade-2 { background: #86efac; }
        .intensidade-3 { background: #4ade80; }
        .intensidade-4 { background: #22c55e; color: white; }
    </style>
</head>
<body>

    <div id="secao-login">
        <div class="login-box">
            <h2>Sentinela Ops</h2>
            <p>Painel de Gerência</p>
            <input type="email" id="email" placeholder="E-mail">
            <input type="password" id="senha" placeholder="Senha">
            <button class="primary" onclick="fazerLogin()">Acessar</button>
            <p id="erro-login" style="color:red; font-size:12px; margin-top:10px;"></p>
        </div>
    </div>

    <nav id="nav-lateral" style="display:none;">
        <h2>GERÊNCIA</h2>
        <button class="nav-btn active" onclick="alternarVisao('dashboard')">📊 Dashboard</button>
        <button class="nav-btn" onclick="alternarVisao('rondas')">📋 Rondas</button>
        <button class="nav-btn" onclick="alternarVisao('postos')">🏢 Postos</button>
        <button class="nav-btn" onclick="alternarVisao('relatorios')">👤 Relatórios</button>
        <button class="nav-btn" onclick="alternarVisao('calor')">🔥 Mapa de Calor</button>
        <button class="nav-btn btn-logout" onclick="fazerLogout()">Sair</button>
    </nav>

    <div class="main" id="conteudo-painel" style="display:none;">
        <header style="margin-bottom:30px;">
            <h1 id="titulo-aba">Dashboard</h1>
            <small id="status-fb">Conectado ao Firestore</small>
        </header>

        <!-- DASHBOARD -->
        <section id="view-dashboard" class="view-secao active">
            <div class="card-grid">
                <div class="card"><h3>Rondas (Total)</h3><div class="valor" id="dash-v-total">0</div></div>
                <div class="card"><h3>Postos Ativos</h3><div class="valor" id="dash-p-total">0</div></div>
                <div class="card"><h3>KM Total</h3><div class="valor" id="dash-km-total">0</div></div>
            </div>
            <div style="background:white; padding:20px; border-radius:8px; height:300px;">
                <canvas id="chartAtividade"></canvas>
            </div>
        </section>

        <!-- RONDAS -->
        <section id="view-rondas" class="view-secao">
            <table>
                <thead><tr><th>Colaborador</th><th>Posto</th><th>Data/Hora</th><th>Motivo</th><th>KM</th></tr></thead>
                <tbody id="corpo-rondas"></tbody>
            </table>
        </section>

        <!-- POSTOS (CORRIGIDO: LÊ DA COLEÇÃO 'POSTOS') -->
        <section id="view-postos" class="view-secao">
            <table id="tabela-postos-oficial">
                <thead><tr><th>Nome do Posto</th><th>Cidade/Local</th><th>Última Visita</th><th>Status</th></tr></thead>
                <tbody id="corpo-postos"></tbody>
            </table>
        </section>

        <!-- RELATORIOS -->
        <section id="view-relatorios" class="view-secao">
            <select id="sel-user-rel" onchange="gerarRelatorio()"></select>
            <div class="card-grid"><div class="card"><h3>Visitas no Mês</h3><div class="valor" id="rel-v-mes">0</div></div></div>
            <table id="tab-rel">
                <thead><tr><th>Data</th><th>Posto</th><th>Motivo</th></tr></thead>
                <tbody id="corpo-rel"></tbody>
            </table>
        </section>

        <!-- CALOR -->
        <section id="view-calor" class="view-secao">
            <select id="sel-user-calor" onchange="desenharCalor()"></select>
            <div class="card"><div id="heatmap-container" class="heatmap-grid"></div></div>
        </section>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBL4Nka91iGIAWSTfvAmsqDHCj2KMhWZ70",
            authDomain: "sentinela-ops-profissional.firebaseapp.com",
            projectId: "sentinela-ops-profissional",
            storageBucket: "sentinela-ops-profissional.firebasestorage.app",
            messagingSenderId: "458111218365",
            appId: "1:458111218365:web:0f3b41ab7c2ceb7feebdd4"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const fs = firebase.firestore();

        let rondas = [];
        let listaPostos = [];
        let chart = null;

        auth.onAuthStateChanged(async user => {
            if (user) {
                const doc = await fs.collection("usuarios").doc(user.uid).get();
                if (doc.exists && doc.data().role === "admin" || ["admin@sentinela.com", "gerencia@sentinela.com"].includes(user.email)) {
                    document.getElementById('secao-login').style.display = 'none';
                    document.getElementById('nav-lateral').style.display = 'flex';
                    document.getElementById('conteudo-painel').style.display = 'block';
                    ouvirDados();
                } else {
                    alert("Acesso restrito");
                    auth.signOut();
                }
            } else {
                document.getElementById('secao-login').style.display = 'flex';
                document.getElementById('nav-lateral').style.display = 'none';
                document.getElementById('conteudo-painel').style.display = 'none';
            }
        });

        function fazerLogin() {
            auth.signInWithEmailAndPassword(document.getElementById('email').value, document.getElementById('senha').value)
                .catch(() => document.getElementById('erro-login').innerText = "Falha no login");
        }

        function fazerLogout() { auth.signOut(); }

        function alternarVisao(id) {
            document.querySelectorAll('.view-secao').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('view-'+id).classList.add('active');
            event.currentTarget.classList.add('active');
            document.getElementById('titulo-aba').innerText = id.toUpperCase();
        }

        function ouvirDados() {
            // Escuta POSTOS (Cadastros)
            fs.collection('postos').onSnapshot(snap => {
                listaPostos = snap.docs.map(d => ({id: d.id, ...d.data()}));
                atualizarPostos();
                document.getElementById('dash-p-total').innerText = listaPostos.length;
            });

            // Escuta RONDAS (Atividade)
            fs.collection('rondas').orderBy('timestamp', 'desc').onSnapshot(snap => {
                rondas = snap.docs.map(d => d.data());
                const corpo = document.getElementById('corpo-rondas');
                corpo.innerHTML = "";
                let kmTotal = 0;
                
                rondas.forEach(r => {
                    kmTotal += parseFloat(r.km) || 0;
                    corpo.innerHTML += `<tr><td>${r.colaborador}</td><td>${r.posto}</td><td>${r.data} ${r.hora}</td><td>${r.motivo}</td><td>${r.km}</td></tr>`;
                });

                document.getElementById('dash-v-total').innerText = rondas.length;
                document.getElementById('dash-km-total').innerText = kmTotal.toFixed(1);
                
                atualizarFiltros();
                atualizarPostos();
                desenharChart();
            });
        }

        function atualizarPostos() {
            const corpo = document.getElementById('corpo-postos');
            corpo.innerHTML = "";
            listaPostos.forEach(p => {
                const ultima = rondas.find(r => r.posto === p.nome);
                const dataU = ultima ? `${ultima.data} ${ultima.hora}` : "Sem visitas";
                const status = ultima ? "● Ativo" : "○ Pendente";
                corpo.innerHTML += `<tr><td>${p.nome}</td><td>${p.cidade || 'N/A'}</td><td>${dataU}</td><td>${status}</td></tr>`;
            });
        }

        function atualizarFiltros() {
            const users = [...new Set(rondas.map(r => r.colaborador))];
            let html = '<option value="">Selecionar...</option>';
            users.forEach(u => html += `<option value="${u}">${u}</option>`);
            document.getElementById('sel-user-rel').innerHTML = html;
            document.getElementById('sel-user-calor').innerHTML = html;
        }

        function desenharChart() {
            const ctx = document.getElementById('chartAtividade').getContext('2d');
            if(chart) chart.destroy();
            const counts = {};
            rondas.slice(0,10).forEach(r => counts[r.posto] = (counts[r.posto] || 0) + 1);
            chart = new Chart(ctx, {
                type: 'bar',
                data: { labels: Object.keys(counts), datasets: [{ label: 'Visitas', data: Object.values(counts), backgroundColor: '#2563eb' }]},
                options: { responsive: true, maintainAspectRatio: false }
            });
        }

        function desenharCalor() {
            const user = document.getElementById('sel-user-calor').value;
            const container = document.getElementById('heatmap-container');
            container.innerHTML = "";
            const freq = {};
            rondas.filter(r => r.colaborador === user).forEach(r => {
                const dia = parseInt(r.data.split('-')[2] || r.data.split('/')[0]);
                freq[dia] = (freq[dia] || 0) + 1;
            });

            for(let i=1; i<=31; i++) {
                let n = 0;
                const v = freq[i] || 0;
                if(v > 0 && v < 3) n=1; else if(v >= 3 && v < 6) n=2; else if(v >= 6) n=4;
                container.innerHTML += `<div class="heatmap-dia intensidade-${n}">${i}</div>`;
            }
        }
    </script>
</body>
</html>
