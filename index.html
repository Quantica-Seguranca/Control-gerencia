<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerência - Sentinela Ops</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #34495e;
            --success: #27ae60;
            --danger: #e74c3c;
            --accent: #2563eb;
            --bg: #f4f7f6;
            --calor-0: #f1f5f9;
            --calor-1-3: #eab308;
            --calor-4-7: #f97316;
            --calor-8-12: #ef4444;
            --calor-13: #991b1b;
        }

        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); margin: 0; display: flex; min-height: 100vh; }
        
        nav { width: 260px; background: var(--primary); color: white; padding: 20px; display: flex; flex-direction: column; box-shadow: 2px 0 10px rgba(0,0,0,0.1); z-index: 100; }
        nav h2 { font-size: 18px; text-align: center; border-bottom: 1px solid #4f5d73; padding-bottom: 15px; margin-bottom: 20px; }
        .nav-btn { background: none; border: none; color: #bdc3c7; padding: 12px; text-align: left; cursor: pointer; width: 100%; border-radius: 6px; margin-bottom: 5px; transition: 0.3s; }
        .nav-btn:hover, .nav-btn.active { background: var(--secondary); color: white; }
        .btn-logout { background: var(--danger); color: white; margin-top: auto; text-align: center; }

        .main { flex: 1; padding: 30px; overflow-y: auto; }
        #secao-login { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: flex; align-items: center; justify-content: center; }
        .login-box { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 350px; text-align: center; }
        
        input, select { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button.primary { width: 100%; padding: 12px; background: var(--success); color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
        button.secondary { background: #e2e8f0; color: var(--primary); border: 1px solid #cbd5e1; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-weight: 500; }
        button.btn-pdf { background: var(--accent); color: white; border: none; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; display: inline-flex; align-items: center; gap: 5px; }

        .view-secao { display: none; }
        .view-secao.active { display: block; }

        .card-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); border-left: 4px solid var(--accent); }
        .card h3 { margin: 0; font-size: 12px; color: #7f8c8d; text-transform: uppercase; }
        .card .valor { font-size: 24px; font-weight: bold; margin-top: 5px; }

        table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #eee; font-size: 14px; }
        th { background: var(--secondary); color: white; }

        .heatmap-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; max-width: 100%; margin-top: 15px; }
        .heatmap-dia { aspect-ratio: 1; border-radius: 6px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 14px; font-weight: bold; border: 1px solid #e2e8f0; }
        .intensidade-0 { background: var(--calor-0); color: #94a3b8; }
        .intensidade-1 { background: var(--calor-1-3); color: #854d0e; }
        .intensidade-2 { background: var(--calor-4-7); color: #ffffff; }
        .intensidade-3 { background: var(--calor-8-12); color: #ffffff; }
        .intensidade-4 { background: var(--calor-13); color: #ffffff; }
    </style>
</head>
<body>

    <div id="secao-login">
        <div class="login-box">
            <h2>Sentinela Ops</h2>
            <p>Painel de Gerência</p>
            <input type="email" id="email" placeholder="E-mail">
            <input type="password" id="senha" placeholder="Senha">
            <button class="primary" onclick="fazerLogin()">Acessar</button>
            <p id="erro-login" style="color:red; font-size:12px; margin-top:10px;"></p>
        </div>
    </div>

    <nav id="nav-lateral" style="display:none;">
        <h2>GERÊNCIA</h2>
        <button class="nav-btn active" onclick="alternarVisao('postos')">🏢 Postos</button>
        <button class="nav-btn" onclick="alternarVisao('calor')">🔥 Mapa de Calor</button>
        <button class="nav-btn" onclick="alternarVisao('financeiro')">💰 Financeiro</button>
        <button class="nav-btn" id="btn-menu-admin" onclick="alternarVisao('administracao')">👑 Administração</button>
        <button class="nav-btn" id="btn-menu-combustivel" onclick="alternarVisao('combustivel')">⛽ Combustível</button>
        <button class="nav-btn btn-logout" onclick="fazerLogout()">Sair</button>
    </nav>

    <div class="main" id="conteudo-painel" style="display:none;">
        <header style="margin-bottom:30px;">
            <h1 id="titulo-aba">POSTOS</h1>
        </header>

        <section id="view-postos" class="view-secao active">
            <div class="card-grid">
                <div class="card">
                    <h3>Total de Postos</h3>
                    <div class="valor" id="postos-p-total">0</div>
                </div>
            </div>
            <table id="tabela-postos-oficial">
                <thead><tr><th>Nome do Posto</th><th>Cidade/Local</th></tr></thead>
                <tbody id="corpo-postos"></tbody>
            </table>
        </section>

        <section id="view-calor" class="view-secao">
            <div class="heatmap-wrapper-vertical">
                <div class="seletor-posto-container">
                    <select id="sel-posto-calor" onchange="dispararMudancaSeletorPosto()">
                        <option value="">Selecione um posto...</option>
                    </select>
                </div>
                <div class="heatmap-calendario-box" id="area-impressao-pdf">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                        <h3 id="nome-posto-selecionado">Nenhum posto selecionado</h3>
                        <button class="btn-pdf" onclick="exportarMapaParaPDF()">📄 Baixar PDF</button>
                    </div>
                    <div class="heatmap-controles">
                        <button class="secondary" onclick="alterarMes(-1)">◀ Voltar</button>
                        <div class="heatmap-mes-titulo" id="filtro-mes-ano-texto">Mês Corrente</div>
                        <button class="secondary" onclick="alterarMes(1)">Avançar ▶</button>
                    </div>
                    <div id="heatmap-container" class="heatmap-grid"></div>
                </div>
            </div>
        </section>
        
        </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBL4Nka91iGIAWSTfvAmsqDHCj2KMhWZ70",
            authDomain: "sentinela-ops-profissional.firebaseapp.com",
            projectId: "sentinela-ops-profissional",
            storageBucket: "sentinela-ops-profissional.firebasestorage.app",
            messagingSenderId: "458111218365",
            appId: "1:458111218365:web:0f3b41ab7c2ceb7feebdd4"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const fs = firebase.firestore();

        let rondas = [];
        let visitorsRegistrados = [];
        let postoSelecionadoAtual = "";
        let dataFiltroAlvo = new Date();

        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('secao-login').style.display = 'none';
                document.getElementById('nav-lateral').style.display = 'flex';
                document.getElementById('conteudo-painel').style.display = 'block';
                ouvirDados();
            } else {
                document.getElementById('secao-login').style.display = 'flex';
            }
        });

        function fazerLogin() {
            auth.signInWithEmailAndPassword(document.getElementById('email').value, document.getElementById('senha').value)
                .catch(() => document.getElementById('erro-login').innerText = "Falha no login");
        }

        function fazerLogout() { auth.signOut(); window.location.reload(); }

        function alternarVisao(id) {
            document.querySelectorAll('.view-secao').forEach(s => s.classList.remove('active'));
            document.getElementById('view-' + id).classList.add('active');
            document.getElementById('titulo-aba').innerText = id.toUpperCase();
        }

        function ouvirDados() {
            fs.collection('postos').onSnapshot(snap => {
                const lista = snap.docs.map(d => ({id: d.id, ...d.data()}));
                document.getElementById('postos-p-total').innerText = lista.length;
                const sel = document.getElementById('sel-posto-calor');
                sel.innerHTML = '<option value="">Selecione...</option>';
                lista.forEach(p => sel.innerHTML += `<option value="${p.nome}">${p.nome}</option>`);
            });

            fs.collection('rondas').onSnapshot(snap => {
                rondas = snap.docs.map(d => d.data());
                if(postoSelecionadoAtual) desenharCalor(postoSelecionadoAtual);
            });

            fs.collection('visitantes_heatmap').onSnapshot(snap => {
                visitorsRegistrados = snap.docs.map(d => d.data());
                if(postoSelecionadoAtual) desenharCalor(postoSelecionadoAtual);
            });
        }

        function dispararMudancaSeletorPosto() {
            const nome = document.getElementById('sel-posto-calor').value;
            if(nome) desenharCalor(nome);
        }

        function alterarMes(direcao) {
            dataFiltroAlvo.setMonth(dataFiltroAlvo.getMonth() + direcao);
            if(postoSelecionadoAtual) desenharCalor(postoSelecionadoAtual);
        }

        // ======================================================
        // FUNÇÃO ATUALIZADA COM A CORREÇÃO 03
        // ======================================================
        function desenharCalor(nomePosto) {
            postoSelecionadoAtual = nomePosto;
            document.getElementById('nome-posto-selecionado').innerText = nomePosto;
            
            const container = document.getElementById('heatmap-container');
            container.innerHTML = "";

            const anoAlvo = dataFiltroAlvo.getFullYear();
            const mesAlvo = dataFiltroAlvo.getMonth();
            
            document.getElementById('filtro-mes-ano-texto').innerText = 
                dataFiltroAlvo.toLocaleDateString('pt-BR', { month: 'long', year: 'numeric' });

            const primeiroDiaMes = new Date(anoAlvo, mesAlvo, 1).getDay();
            const diasNoMes = new Date(anoAlvo, mesAlvo + 1, 0).getDate();

            for (let i = 0; i < primeiroDiaMes; i++) {
                const vazio = document.createElement('div');
                vazio.className = 'heatmap-dia';
                vazio.style.border = "none";
                container.appendChild(vazio);
            }

            const volumetriaDiaria = {};

            // APLICAÇÃO DA CORREÇÃO 03: Leitura retroativa
            rondas.forEach(r => {
                const dataRonda = r.dataBR || r.data; 

                if (r.posto === nomePosto && dataRonda) {
                    const partes = dataRonda.split('-'); 
                    if (partes.length === 3) {
                        const anoReg = parseInt(partes[0], 10);
                        const mesReg = parseInt(partes[1], 10) - 1; 
                        const diaReg = parseInt(partes[2], 10);
                        
                        if (anoReg === anoAlvo && mesReg === mesAlvo) {
                            const incremento = r.visitantes ? parseInt(r.visitantes, 10) : 1;
                            volumetriaDiaria[diaReg] = (volumetriaDiaria[diaReg] || 0) + incremento;
                        }
                    }
                }
            });

            // Soma de registros manuais da gerência
            visitorsRegistrados.forEach(v => {
                if (v.posto === nomePosto && v.data) {
                    const partes = v.data.split('-');
                    if (parseInt(partes[0], 10) === anoAlvo && (parseInt(partes[1], 10)-1) === mesAlvo) {
                        const dia = parseInt(partes[2], 10);
                        volumetriaDiaria[dia] = (volumetriaDiaria[dia] || 0) + parseInt(v.visitantes || 0, 10);
                    }
                }
            });

            for (let d = 1; d <= diasNoMes; d++) {
                const total = volumetriaDiaria[d] || 0;
                let nivel = 0;
                if (total >= 1 && total <= 3) nivel = 1;
                else if (total >= 4 && total <= 7) nivel = 2;
                else if (total >= 8 && total <= 12) nivel = 3;
                else if (total >= 13) nivel = 4;

                const div = document.createElement('div');
                div.className = `heatmap-dia intensidade-${nivel}`;
                div.innerHTML = `${d}<span>${total} vis.</span>`;
                container.appendChild(div);
            }
        }

        function exportarMapaParaPDF() {
            const element = document.getElementById('area-impressao-pdf');
            html2pdf().from(element).set({ margin: 10, filename: 'Mapa_Calor.pdf' }).save();
        }
    </script>
</body>
</html>
