<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Gerência - Sentinela Ops</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        #secao-login { max-width: 300px; margin: 100px auto; text-align: center; border: 1px solid #ccc; padding: 20px; border-radius: 8px; }
        #secao-painel { display: none; } /* Escondido até o login */
        input { width: 100%; margin-bottom: 10px; padding: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; cursor: pointer; background-color: #007bff; color: white; border: none; border-radius: 4px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f4f4f4; }
        .btn-logout { width: auto; background-color: #dc3545; float: right; }
    </style>
</head>
<body>

    <div id="secao-login">
        <h2>Acesso Restrito</h2>
        <input type="email" id="email" placeholder="E-mail da Gerência">
        <input type="password" id="senha" placeholder="Senha">
        <button onclick="fazerLogin()">Entrar</button>
        <p id="erro-login" style="color: red;"></p>
    </div>

    <div id="secao-painel">
        <header>
            <button class="btn-logout" onclick="fazerLogout()">Sair</button>
            <h1>Gerência de Controle - Sentinela</h1>
            <p>Monitoramento de Postos em Tempo Real</p>
        </header>

        <main>
            <div id="status">Conectando...</div>
            <table id="tabela-visitas">
                <thead>
                    <tr>
                        <th>Colaborador</th>
                        <th>Posto</th>
                        <th>Data/Hora</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="corpo-tabela"></tbody>
            </table>
        </main>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBL4Nka91iGIAWSTfvAmsqDHCj2KMhWZ70",
            authDomain: "sentinela-ops-profissional.firebaseapp.com",
            projectId: "sentinela-ops-profissional",
            storageBucket: "sentinela-ops-profissional.firebasestorage.app",
            messagingSenderId: "458111218365",
            appId: "1:458111218365:web:0f3b41ab7c2ceb7feebdd4"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const database = firebase.database();

        // 1. MONITORAR ESTADO DE AUTENTICAÇÃO
        auth.onAuthStateChanged((user) => {
            if (user) {
                // Usuário logado
                document.getElementById('secao-login').style.display = 'none';
                document.getElementById('secao-painel').style.display = 'block';
                iniciarMonitoramento();
            } else {
                // Usuário deslogado
                document.getElementById('secao-login').style.display = 'block';
                document.getElementById('secao-painel').style.display = 'none';
            }
        });

        // 2. FUNÇÃO DE LOGIN
        function fazerLogin() {
            const email = document.getElementById('email').value;
            const senha = document.getElementById('senha').value;
            const erroDiv = document.getElementById('erro-login');

            auth.signInWithEmailAndPassword(email, senha)
                .catch((error) => {
                    erroDiv.innerText = "Falha no acesso: Verifique e-mail e senha.";
                });
        }

        // 3. FUNÇÃO DE LOGOUT
        function fazerLogout() {
            auth.signOut();
        }

        // 4. MONITORAR DADOS (CHAMADA APENAS SE LOGADO)
        function iniciarMonitoramento() {
            const caminhoDados = database.ref('rondas');
            caminhoDados.on('value', (snapshot) => {
                const corpoTabela = document.getElementById('corpo-tabela');
                const statusDiv = document.getElementById('status');
                corpoTabela.innerHTML = "";

                if (snapshot.exists()) {
                    statusDiv.innerText = "Monitoramento ativo.";
                    snapshot.forEach((childSnapshot) => {
                        const dados = childSnapshot.val();
                        const linha = `
                            <tr>
                                <td>${dados.colaborador || 'N/A'}</td>
                                <td>${dados.posto || 'N/A'}</td>
                                <td>${dados.dataHora || 'N/A'}</td>
                                <td>${dados.status || 'OK'}</td>
                            </tr>
                        `;
                        corpoTabela.innerHTML += linha;
                    });
                } else {
                    statusDiv.innerText = "Nenhum registro encontrado no banco.";
                }
            });
        }
    </script>
</body>
</html>
